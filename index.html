<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Hub - Ranking</title>
    <style>
        /* CSS - Estilização Premium Dark */
        body {
            background-color: #080a0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        header { text-align: center; margin-bottom: 30px; }
        
        h1 { 
            letter-spacing: 3px; 
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .tabs { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .tab-btn {
            background: #1a1d1f;
            border: 2px solid #2a2e31;
            color: #888;
            padding: 10px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            border-color: #00ffa3;
            color: #00ffa3;
        }

        /* Container Principal */
        .container {
            width: 100%;
            max-width: 550px;
        }

        .card {
            background: #111315;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { margin-top: 0; font-size: 1.1rem; color: #efefef; }

        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }

        input, select {
            background: #1a1d1f;
            border: 1px solid #2a2e31;
            color: white;
            padding: 12px;
            border-radius: 8px;
            flex: 1;
            outline: none;
        }

        input:focus, select:focus { border-color: #00ffa3; }

        .save-btn {
            background: #00ffa3;
            color: #080a0b;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .save-btn:active { transform: scale(0.98); }

        /* Estilo do Ranking */
        .ranking-title {
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .ranking-item {
            background: #1a1d1f;
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .team-info .name { 
            font-weight: bold; 
            display: block; 
            font-size: 1rem;
        }

        .team-info .years { 
            color: #888; 
            font-size: 0.8rem; 
            margin-top: 4px; 
            display: block;
        }

        .titles-count { 
            color: #f1c40f; 
            font-weight: bold; 
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>FOOTBALL HUB</h1>
        <div class="tabs">
            <button class="tab-btn active">CLUBES</button>
            <button class="tab-btn">JOGADORES</button>
        </div>
    </header>

    <div class="container">
        <!-- Área de Registro -->
        <section class="card">
            <h3>🏆 Registrar Temporada (Clubes)</h3>
            <div class="input-group">
                <input type="number" id="ano" placeholder="Ex: 2024">
                <select id="liga">
                    <option value="La Liga">La Liga</option>
                    <option value="Bundesliga">Bundesliga</option>
                    <option value="Série A">Série A</option>
                    <option value="Champions League">Champions League</option>
                    <option value="Premier League">Premier League</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="campeao" placeholder="Nome do Time Campeão">
            </div>
            <button class="save-btn" onclick="adicionarCampeao()">SALVAR REGISTRO</button>
        </section>

        <!-- Área do Ranking -->
        <span class="ranking-title" id="tituloRanking">Ranking La Liga</span>
        <div id="listaRanking">
            <!-- Itens inseridos via JS -->
        </div>
    </div>

    <script>
        // Lógica de Funcionamento
        function adicionarCampeao() {
            const anoInput = document.getElementById('ano');
            const ligaInput = document.getElementById('liga');
            const campeaoInput = document.getElementById('campeao');

            const ano = anoInput.value;
            const liga = ligaInput.value;
            const campeao = campeaoInput.value.trim();

            if (!ano || !campeao) {
                alert("Por favor, preencha o ano e o nome do time!");
                return;
            }

            // Recupera dados do LocalStorage
            let dados = JSON.parse(localStorage.getItem('football_db')) || [];
            
            // Adiciona novo registro
            dados.push({ ano, liga, campeao });
            
            // Salva de volta
            localStorage.setItem('football_db', JSON.stringify(dados));

            // Limpa os campos
            anoInput.value = "";
            campeaoInput.value = "";

            renderizarRanking();
        }

        function renderizarRanking() {
            const dados = JSON.parse(localStorage.getItem('football_db')) || [];
            const listaRanking = document.getElementById('listaRanking');
            const ligaAtual = document.getElementById('liga').value;
            
            document.getElementById('tituloRanking').innerText = `Ranking ${ligaAtual}`;
            listaRanking.innerHTML = "";

            // Agrupar títulos por time para a liga selecionada
            const rankingMap = {};

            dados.filter(d => d.liga === ligaAtual).forEach(item => {
                if (!rankingMap[item.campeao]) {
                    rankingMap[item.campeao] = { count: 0, anos: [] };
                }
                rankingMap[item.campeao].count++;
                rankingMap[item.campeao].anos.push(item.ano);
            });

            // Converter para array e ordenar pelo número de títulos (maior para menor)
            const rankingOrdenado = Object.entries(rankingMap).sort((a, b) => b[1].count - a[1].count);

            // Criar o HTML dos itens
            rankingOrdenado.forEach(([time, info]) => {
                // Ordena os anos de forma crescente
                const anosOrdenados = info.anos.sort((a, b) => a - b).join(', ');

                const div = document.createElement('div');
                div.className = 'ranking-item';
                div.innerHTML = `
                    <div class="team-info">
                        <span class="name">${time}</span>
                        <span class="years">${anosOrdenados}</span>
                    </div>
                    <div class="titles-count">${info.count} ${info.count > 1 ? 'Títulos' : 'Título'}</div>
                `;
                listaRanking.appendChild(div);
            });
        }

        // Evento para atualizar o ranking automaticamente quando mudar a liga no seletor
        document.getElementById('liga').addEventListener('change', renderizarRanking);

        // Inicia a tabela ao carregar a página
        window.onload = renderizarRanking;
    </script>
</body>
</html>
