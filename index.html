<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Hub - Edição</title>
    <style>
        body {
            background-color: #080a0b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { letter-spacing: 3px; margin-bottom: 25px; }

        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }

        .tab-btn {
            background: #1a1d1f;
            border: 2px solid #2a2e31;
            color: #888;
            padding: 10px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active { border-color: #00ffa3; color: #00ffa3; }

        .container { width: 100%; max-width: 550px; }

        .card {
            background: #111315;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }

        input, select {
            background: #1a1d1f;
            border: 1px solid #2a2e31;
            color: white;
            padding: 12px;
            border-radius: 8px;
            flex: 1;
        }

        .save-btn {
            background: #00ffa3;
            color: #080a0b;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* NOVO: Estilo do botão cancelar/excluir no formulário */
        .cancel-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: none; /* Escondido por padrão */
        }

        .ranking-item {
            background: #1a1d1f;
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-info .name { font-weight: bold; display: block; }
        .team-info .years { color: #888; font-size: 0.8rem; margin-top: 4px; }
        
        /* NOVO: Estilo para os anos clicáveis e botão de lixo */
        .year-tag { 
            cursor: pointer; 
            transition: 0.2s; 
            display: inline-flex;
            align-items: center;
            background: #2a2e31;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
        }
        .year-tag:hover { color: #00ffa3; background: #333; }

        .titles-count { color: #f1c40f; font-weight: bold; }
        
        .edit-hint { font-size: 0.7rem; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>FOOTBALL HUB</h1>
    <div class="tabs">
        <button class="tab-btn active">CLUBES</button>
        <button class="tab-btn">JOGADORES</button>
    </div>

    <div class="container">
        <section class="card">
            <h3>🏆 Registrar/Editar Temporada</h3>
            <input type="hidden" id="editIndex" value="-1">
            <div class="input-group">
                <input type="number" id="ano" placeholder="Ano">
                <select id="liga">
                    <option value="La Liga">La Liga</option>
                    <option value="Champions League">Champions League</option>
                    <option value="Bundesliga">Bundesliga</option>
                    <option value="Série A">Série A</option>
                    <option value="Premier League">Premier League</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="campeao" placeholder="Time Campeão">
            </div>
            <button class="save-btn" id="btnSalvar" onclick="salvarRegistro()">SALVAR REGISTRO</button>
            <!-- NOVO: Botão para excluir/cancelar a edição atual -->
            <button class="cancel-btn" id="btnExcluir" onclick="excluirRegistro()">EXCLUIR ESTE REGISTRO</button>
            
            <p class="edit-hint">* Clique nos anos no ranking para editar ou excluir.</p>
        </section>

        <h3 id="tituloRanking">Ranking</h3>
        <div id="listaRanking"></div>
    </div>

    <script>
        function salvarRegistro() {
            const ano = document.getElementById('ano').value;
            const liga = document.getElementById('liga').value;
            const campeao = document.getElementById('campeao').value.trim();
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!ano || !campeao) return alert("Preencha os campos!");

            let dados = JSON.parse(localStorage.getItem('football_db')) || [];

            if (editIndex > -1) {
                dados[editIndex] = { ano, liga, campeao };
            } else {
                dados.push({ ano, liga, campeao });
            }

            localStorage.setItem('football_db', JSON.stringify(dados));
            limparForm();
            renderizarRanking();
        }

        // NOVO: Função para excluir o registro que está sendo editado
        function excluirRegistro() {
            const editIndex = parseInt(document.getElementById('editIndex').value);
            if (editIndex > -1 && confirm("Tem certeza que deseja apagar este título?")) {
                let dados = JSON.parse(localStorage.getItem('football_db')) || [];
                dados.splice(editIndex, 1); // Remove o item do array
                localStorage.setItem('football_db', JSON.stringify(dados));
                limparForm();
                renderizarRanking();
            }
        }

        function prepararEdicao(ano, liga, time) {
            let dados = JSON.parse(localStorage.getItem('football_db')) || [];
            const index = dados.findIndex(d => d.ano == ano && d.liga == liga && d.campeao == time);
            
            if (index > -1) {
                document.getElementById('ano').value = dados[index].ano;
                document.getElementById('liga').value = dados[index].liga;
                document.getElementById('campeao').value = dados[index].campeao;
                document.getElementById('editIndex').value = index;
                
                document.getElementById('btnSalvar').innerText = "ATUALIZAR DADOS";
                document.getElementById('btnSalvar').style.background = "#f1c40f";
                
                // NOVO: Mostra o botão de excluir
                document.getElementById('btnExcluir').style.display = "block";
                
                window.scrollTo(0, 0);
            }
        }

        function renderizarRanking() {
            const dados = JSON.parse(localStorage.getItem('football_db')) || [];
            const listaRanking = document.getElementById('listaRanking');
            const ligaAtual = document.getElementById('liga').value;
            
            document.getElementById('tituloRanking').innerText = `Ranking ${ligaAtual}`;
            listaRanking.innerHTML = "";

            const rankingMap = {};
            dados.filter(d => d.liga === ligaAtual).forEach(item => {
                if (!rankingMap[item.campeao]) rankingMap[item.campeao] = { count: 0, anos: [] };
                rankingMap[item.campeao].count++;
                rankingMap[item.campeao].anos.push(item.ano);
            });

            Object.entries(rankingMap)
                .sort((a, b) => b[1].count - a[1].count)
                .forEach(([time, info]) => {
                    // Ajustado para criar "tags" clicáveis melhores
                    const anosHtml = info.anos.sort((a, b) => b - a).map(a => 
                        `<span class="year-tag" onclick="prepararEdicao('${a}', '${ligaAtual}', '${time}')" title="Clique para editar ou excluir">${a}</span>`
                    ).join('');

                    listaRanking.innerHTML += `
                        <div class="ranking-item">
                            <div class="team-info">
                                <span class="name">${time}</span>
                                <div class="years">✎ ${anosHtml}</div>
                            </div>
                            <div class="titles-count">${info.count} Títulos</div>
                        </div>`;
                });
        }

        function limparForm() {
            document.getElementById('ano').value = "";
            document.getElementById('campeao').value = "";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSalvar').innerText = "SALVAR REGISTRO";
            document.getElementById('btnSalvar').style.background = "#00ffa3";
            document.getElementById('btnExcluir').style.display = "none"; // Esconde excluir
        }

        document.getElementById('liga').addEventListener('change', renderizarRanking);
        window.onload = renderizarRanking;
    </script>
</body>
</html>
